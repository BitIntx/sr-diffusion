project:
  name: autoencoder_scratch_tiny
  output_dir: /home/jwheojjang/scratch/sr-diffusion/runs/autoencoder_scratch_tiny

logging:
  wandb:
    enabled: true
    project: sr-diffusion
    name: autoencoder_scratch_tiny
    mode: offline
    dir: /home/jwheojjang/scratch/sr-diffusion/wandb
    tags: [autoencoder, smoke]
    watch: false

seed: 1337

data:
  manifest: /home/jwheojjang/scratch/sr-diffusion/data/toy/manifest.csv
  split: train
  hr_size: 128
  scale: 4
  degradation_preset: mild
  domains:
    photo: 0
    anime: 1
  num_workers: 0

model:
  type: autoencoder_kl
  in_channels: 3
  out_channels: 3
  base_channels: 32
  channel_multipliers: [1, 2, 4]
  latent_channels: 8
  num_res_blocks: 1
  norm_groups: 8

train:
  device: auto
  dtype: bf16
  batch_size: 2
  max_steps: 100
  lr: 0.0001
  weight_decay: 0.0
  grad_accum_steps: 1
  log_every: 5
  save_every: 50
  sample_every: 25
  compile: false

loss:
  reconstruction: charbonnier
  kl_weight: 0.000001
  perceptual_weight: 0.0
