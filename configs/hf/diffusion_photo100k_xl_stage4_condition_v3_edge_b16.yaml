project:
  name: diffusion_photo100k_xl_stage4_condition_v3_edge_b16_hf

autoencoder:
  config: autoencoder_stage1.yaml
  checkpoint: ../../checkpoints/stage1_autoencoder_best_eval_recon.pt

condition_encoder:
  config: latent_pretrain_photo100k_v3_noise_xl.yaml
  checkpoint: ../../checkpoints/stage2_photo100k_v3_noise_xl_b64_step_0072000.pt
  trainable: false

data:
  hr_size: 512
  scale: 4
  degradation_preset: photo_v3_noise_mix
  domains:
    photo: 0
    anime: 1

model:
  type: conditional_unet
  latent_channels: 16
  condition_channels: 16
  out_channels: 16
  base_channels: 128
  channel_multipliers: [1, 2, 4, 8]
  num_res_blocks: 6
  norm_groups: 32
  num_heads: 8
  attention_resolutions: [32, 16]
  base_resolution: 128
  num_domains: 2

diffusion:
  num_train_timesteps: 1000
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  sample_timestep: 50
  train_min_timestep: 25
  train_max_timestep: 125
  train_init: condition

sampling:
  init: condition
  start_timestep: 50
  steps: 32

train:
  dtype: bf16

inference:
  checkpoint: ../../checkpoints/stage4_photo100k_xl_edge_b16_best_eval_condition_decoded.pt
  init: condition
  steps: 32
  start_timestep: 50
