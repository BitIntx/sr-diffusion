project:
  name: autoencoder_photo10k_b16_lrgthr_online
  output_dir: /home/jwheojjang/scratch/sr-diffusion/runs/autoencoder_photo10k_b16_lrgthr_online

logging:
  wandb:
    enabled: true
    project: sr-diffusion
    name: autoencoder_photo10k_b16_lrgthr_online
    mode: online
    dir: /home/jwheojjang/scratch/sr-diffusion/wandb
    tags: [autoencoder, photo10k, photo, b16, lrgthr]
    watch: false
  samples:
    enabled: true
    split: val
    fallback_split: train
    count: 4
    indices: [0, 1, 2, 3]

seed: 1337

data:
  manifest: /home/jwheojjang/scratch/sr-diffusion/data/manifest_photo10k.csv
  split: train
  hr_size: 512
  scale: 4
  degradation_preset: mild
  domains:
    photo: 0
    anime: 1
  num_workers: 4

model:
  type: autoencoder_kl
  in_channels: 3
  out_channels: 3
  base_channels: 96
  channel_multipliers: [1, 2, 4]
  latent_channels: 16
  num_res_blocks: 2
  norm_groups: 32

train:
  device: auto
  dtype: bf16
  batch_size: 16
  max_steps: 100000
  lr: 0.0001
  weight_decay: 0.0
  grad_accum_steps: 1
  log_every: 50
  save_every: 1000
  sample_every: 500
  compile: false

loss:
  reconstruction: charbonnier
  kl_weight: 0.000001
  perceptual_weight: 0.0
