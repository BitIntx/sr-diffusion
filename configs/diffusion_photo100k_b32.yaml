project:
  name: diffusion_photo100k_b32
  output_dir: /home/jwheojjang/scratch/sr-diffusion/runs/diffusion_photo100k_b32

logging:
  wandb:
    enabled: true
    project: sr-diffusion
    name: diffusion_photo100k_b32
    mode: online
    dir: /home/jwheojjang/scratch/sr-diffusion/wandb
    tags: [stage3, diffusion, photo100k, b32, init-10k]
    watch: false
  samples:
    enabled: true
    split: val
    fallback_split: train
    count: 4
    indices: [0, 1, 2, 3]

seed: 1337

autoencoder:
  config: configs/autoencoder_photo10k.yaml
  checkpoint: /home/jwheojjang/scratch/sr-diffusion/runs/autoencoder_photo10k_b16_eval_online/checkpoints/best_eval_recon.pt

condition_encoder:
  config: configs/latent_pretrain_photo100k.yaml
  checkpoint: /home/jwheojjang/scratch/sr-diffusion/runs/latent_pretrain_photo100k_b64/checkpoints/best_eval_latent.pt
  trainable: false

data:
  manifest: /home/jwheojjang/scratch/sr-diffusion/data/manifest_photo100k.csv
  split: train
  hr_size: 512
  scale: 4
  degradation_preset: mild
  domains:
    photo: 0
    anime: 1
  num_workers: 8

model:
  type: conditional_unet
  latent_channels: 16
  condition_channels: 16
  out_channels: 16
  base_channels: 128
  channel_multipliers: [1, 2, 3, 4]
  num_res_blocks: 2
  norm_groups: 32
  num_heads: 4
  attention_resolutions: [32, 16]
  base_resolution: 128
  num_domains: 2

diffusion:
  num_train_timesteps: 1000
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  sample_timestep: 500

train:
  device: auto
  dtype: bf16
  batch_size: 32
  max_steps: 60000
  lr: 0.0001
  weight_decay: 0.0
  grad_accum_steps: 1
  log_every: 25
  save_every: 2000
  sample_every: 1000

eval:
  enabled: true
  split: val
  limit: 100
  batch_size: 32
  num_workers: 8
  every: 1000
  run_at_start: true
  timestep: 500
