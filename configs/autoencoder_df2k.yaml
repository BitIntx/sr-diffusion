project:
  name: autoencoder_df2k
  output_dir: /home/jwheojjang/scratch/sr-diffusion/runs/autoencoder_df2k

logging:
  wandb:
    enabled: true
    project: sr-diffusion
    name: autoencoder_df2k
    mode: offline
    dir: /home/jwheojjang/scratch/sr-diffusion/wandb
    tags: [autoencoder, df2k, photo]
    watch: false

seed: 1337

data:
  manifest: /home/jwheojjang/scratch/sr-diffusion/data/manifest_df2k_photo.csv
  split: train
  hr_size: 512
  scale: 4
  degradation_preset: mild
  domains:
    photo: 0
    anime: 1
  num_workers: 4

model:
  type: autoencoder_kl
  in_channels: 3
  out_channels: 3
  base_channels: 96
  channel_multipliers: [1, 2, 4]
  latent_channels: 16
  num_res_blocks: 2
  norm_groups: 32

train:
  device: auto
  dtype: bf16
  batch_size: 8
  max_steps: 100000
  lr: 0.0001
  weight_decay: 0.0
  grad_accum_steps: 1
  log_every: 50
  save_every: 1000
  sample_every: 500
  compile: false

loss:
  reconstruction: charbonnier
  kl_weight: 0.000001
  perceptual_weight: 0.0
