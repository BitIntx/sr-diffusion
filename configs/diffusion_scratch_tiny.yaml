project:
  name: diffusion_scratch_tiny
  output_dir: /home/jwheojjang/scratch/sr-diffusion/runs/diffusion_scratch_tiny

logging:
  wandb:
    enabled: true
    project: sr-diffusion
    name: diffusion_scratch_tiny
    mode: offline
    dir: /home/jwheojjang/scratch/sr-diffusion/wandb
    tags: [stage3, diffusion, smoke]
    watch: false
  samples:
    enabled: true
    split: val
    fallback_split: train
    count: 2
    indices: [0, 1]

seed: 1337

autoencoder:
  config: configs/autoencoder_scratch_tiny.yaml
  checkpoint: /home/jwheojjang/scratch/sr-diffusion/runs/autoencoder_scratch_tiny/checkpoints/latest.pt

condition_encoder:
  config: configs/latent_pretrain_scratch_tiny.yaml
  checkpoint: /home/jwheojjang/scratch/sr-diffusion/runs/latent_pretrain_scratch_tiny/checkpoints/latest.pt
  trainable: false

data:
  manifest: /home/jwheojjang/scratch/sr-diffusion/data/toy/manifest.csv
  split: train
  hr_size: 128
  scale: 4
  degradation_preset: mild
  domains:
    photo: 0
    anime: 1
  num_workers: 0

model:
  type: conditional_unet
  latent_channels: 8
  condition_channels: 8
  out_channels: 8
  base_channels: 32
  channel_multipliers: [1, 2]
  num_res_blocks: 1
  norm_groups: 8
  num_heads: 4
  attention_resolutions: [16]
  base_resolution: 32
  num_domains: 2

diffusion:
  num_train_timesteps: 100
  beta_schedule: linear
  beta_start: 0.0001
  beta_end: 0.02
  sample_timestep: 50

train:
  device: auto
  dtype: bf16
  batch_size: 2
  max_steps: 20
  lr: 0.0001
  weight_decay: 0.0
  grad_accum_steps: 1
  log_every: 5
  save_every: 10
  sample_every: 10

eval:
  enabled: true
  split: val
  limit: 4
  batch_size: 2
  num_workers: 0
  every: 10
  run_at_start: true
  timestep: 50
